services:
  db:
    image: mysql:8.0
    container_name: moodledb
    restart: always
    environment:           # ✅ environment must be here, under the service
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: moodle
      MYSQL_USER: moodleuser
      MYSQL_PASSWORD: moodlepass
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3311:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - rtc_net

  php:
    build: ./php
    container_name: moodle_php
    volumes:
      - ./moodle:/var/www/html
      - ./moodledata:/var/moodledata
    networks:
      - rtc_net

  nginx:
    image: nginx:latest
    container_name: moodle_nginx
    ports:
      - "8080:8080"
    volumes:
      - ./moodle:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./moodledata:/var/moodledata
    depends_on:
      - php
    networks:
      - rtc_net

networks:
  rtc_net:
    driver: bridge

volumes:
  db_data:
