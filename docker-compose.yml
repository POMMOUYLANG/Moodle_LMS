services:
  db:
    image: mysql:8.0
    container_name: moodledb
    restart: always
    environment: # ✅ environment must be here, under the service
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: moodle
      MYSQL_USER: moodleuser
      MYSQL_PASSWORD: moodlepass
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3311:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - rtc_net

  php:
    build: ./php
    container_name: moodle_php
    environment:
      DB_HOST: db
      MYSQL_DATABASE: moodle
      MYSQL_USER: moodleuser
      MYSQL_PASSWORD: moodlepass
      MOODLE_DATA_ROOT: /var/moodledata
      MOODLE_SSL_PROXY: "true"
      MOODLE_REVERSE_PROXY: "false"
      GATEWAY_API_DOMAIN: ${GATEWAY_API_DOMAIN:-api.kampot-rtc-edu.com}
      GATEWAY_MOODLE_DOMAIN: lms.kc-rtc-edu.com
    volumes:
      - ./moodle:/var/www/html
      - moodle_data:/var/moodledata
    networks:
      - rtc_net

  nginx:
    image: nginx:latest
    container_name: moodle_nginx
    ports:
      - "8080:8080"
    volumes:
      - ./moodle:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - moodle_data:/var/moodledata
    depends_on:
      - php
    networks:
      - rtc_net

networks:
  rtc_net:
    driver: bridge

volumes:
  db_data:
  moodle_data:
