server {
    listen 80;
    server_name rtc-bb.camai.kh;

    root /var/www/html;  # <- parent folder
    index index.php index.html index.htm;

    client_max_body_size 100M;

    location /moodle/ {
        alias /var/www/html/moodle/;
        index index.php;
        try_files $uri $uri/ /moodle/index.php?$query_string;

        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass moodle-app:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME /var/www/html/moodle$fastcgi_script_name;
        }
    }

    location ~* \.(jpg|jpeg|gif|png|css|js|ico|svg)$ {
        expires max;
        log_not_found off;
    }

    location ~ /\. {
        deny all;
    }
}
