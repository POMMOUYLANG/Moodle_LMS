server {
    listen 80;
    server_name rtc-bb.camai.kh;

    # Optional redirect to HTTPS
    # return 301 https://$host$request_uri;

    root /var/www/html/moodle;
    index index.php index.html index.htm;

    access_log /var/log/nginx/moodle.access.log;
    error_log /var/log/nginx/moodle.error.log;

    # Handle the /moodle path
    location /moodle {
        alias /var/www/html/;
        index index.php;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP handling
    location ~ \.php$ {
        root /var/www/html/moodle;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
    }

    # Cache static assets
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Deny access to sensitive files
    location ~* /(config|\.git|composer\.(json|lock)) {
        deny all;
        return 404;
    }
}
