server {
    listen 80;
    server_name rtc-bb.camai.kh;

    root /var/www;  # parent directory of moodle
    index index.php index.html index.htm;

    client_max_body_size 100M;

    # Serve Moodle at /moodle
    location /moodle/ {
        alias /var/www/moodle/;
        index index.php;

        # Try files, fallback to index.php
        try_files $uri $uri/ /moodle/index.php?$query_string;

        # PHP handling
        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass moodle-app:9000;
            fastcgi_index index.php;
            # IMPORTANT: correct SCRIPT_FILENAME with alias
            fastcgi_param SCRIPT_FILENAME /var/www/moodle$fastcgi_script_name;
        }
    }

    # Static assets cache
    location ~* \.(jpg|jpeg|gif|png|css|js|ico|svg)$ {
        expires max;
        log_not_found off;
    }

    location ~ /\. {
        deny all;
    }
}
