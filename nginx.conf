server {
    listen 80;
    server_name rtc-bb.camai.kh;

    root /var/www/moodle;
    index index.php index.html;

    client_max_body_size 100M;

    # Moodle main site
    location /moodle/ {
        root /var/www;
        index index.php;
        try_files $uri $uri/ /moodle/index.php?$query_string;

        location ~ [^/]\.php(/|$) {
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            fastcgi_index index.php;
            fastcgi_pass moodle-app:9000;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME /var/www$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;
        }
    }

    # Optional: redirect root / to /moodle
    location = / {
        return 301 /moodle/;
    }

    # Cache static files
    location ~* \.(jpg|jpeg|gif|png|css|js|ico|svg|woff|woff2)$ {
        expires 30d;
        log_not_found off;
        access_log off;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}
