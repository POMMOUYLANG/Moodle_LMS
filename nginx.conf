server {
    listen 80;
    server_name rtc-bb.camai.kh;

    root /var/www/moodle;
    index index.php index.html;

    client_max_body_size 100M;

    # Moodle main site
    location /moodle {
        alias /var/www/moodle;
        index index.php;
        try_files $uri $uri/ /moodle/index.php?$query_string;

        location ~ [^/]\.php(/|$) {
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            fastcgi_index index.php;
            fastcgi_pass moodle-app:9000;
            include fastcgi_params;

            fastcgi_param SCRIPT_FILENAME /var/www/moodle$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;
        }
    }

    # Static file caching
    location ~* \.(jpg|jpeg|gif|png|css|js|ico|svg|woff|woff2)$ {
        expires max;
        log_not_found off;
    }

    location ~ /\. {
        deny all;
    }
}
